<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Camarote Mar 2027 | Sapucaí</title>
    <meta name="description" content="Cadastre-se para receber as novidades do Camarote Mar 2027 na Sapucaí.">
    <meta property="og:title" content="Camarote Mar 2027 | Sapucaí">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:description" content="O melhor do Rio te espera. Cadastre-se para receber as novidades.">
    <meta property="og:image" content="assets/img/hero/camarote-mar.jpg">
    <link rel="icon" href="assets/img/favicon/favicon-32x32.png" sizes="32x32">
    <link rel="icon" href="assets/img/favicon/favicon-192x192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="assets/img/favicon/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section class="hero" aria-label="Camarote Mar">
        <video class="hero__video" src="assets/video/video-camarote-2026.mp4" autoplay muted loop playsinline poster="assets/img/hero/bg-kv-27.webp"></video>
        <div class="hero__shade"></div>
      </section>

      <section class="signup" id="cadastro" aria-labelledby="signup-title">
        <div class="section-heading">
          <h2 id="signup-title">Cadastre-se para as <br>novidades de 2027!</h2>
        </div>

        <form class="form" id="lead-form" novalidate>
          <input type="hidden" name="origem" value="github-pages">
          <input type="hidden" name="formulario" value="landing-page-camarote-mar-2027">
          <input type="hidden" name="tag" value="Camarote Mar 2027 - SAPUCAÍ">

          <div class="field field--full">
            <label for="nome">Nome completo <span class="required">*</span></label>
            <input id="nome" name="nome" type="text" autocomplete="name" required>
          </div>

          <div class="field field--third">
            <label for="data_nascimento">Data nasc. <span class="required">*</span></label>
            <input id="data_nascimento" name="data_nascimento" type="text" inputmode="numeric" placeholder="dd/mm/aaaa" autocomplete="bday" required>
          </div>

          <div class="field field--two-third">
            <label for="email">E-mail <span class="required">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>

          <div class="field field--third">
            <label for="cep">CEP <span class="required">*</span></label>
            <input id="cep" name="cep" type="text" inputmode="numeric" autocomplete="postal-code" required>
            <span class="field__hint" id="cep-hint" aria-live="polite"></span>
          </div>

          <div class="field field--two-third">
            <label for="sexo">Sexo <span class="required">*</span></label>
            <select id="sexo" name="sexo" required>
              <option value="">Selecione</option>
              <option value="Feminino">Feminino</option>
              <option value="Masculino">Masculino</option>
              <option value="Prefiro não informar">Prefiro não informar</option>
            </select>
          </div>

          <div class="field field--full">
            <label for="endereco">Endereço <span class="required">*</span></label>
            <input id="endereco" name="endereco" type="text" autocomplete="street-address" required>
          </div>

          <div class="field field--forty">
            <label for="bairro">Bairro <span class="required">*</span></label>
            <input id="bairro" name="bairro" type="text" required>
          </div>

          <div class="field field--forty">
            <label for="cidade">Cidade <span class="required">*</span></label>
            <input id="cidade" name="cidade" type="text" autocomplete="address-level2" required>
          </div>

          <div class="field field--twenty">
            <label for="uf">UF <span class="required">*</span></label>
            <input id="uf" name="uf" type="text" maxlength="2" autocomplete="address-level1" required>
          </div>

          <div class="field field--twenty">
            <label for="numero">Número <span class="required">*</span></label>
            <input id="numero" name="numero" type="text" autocomplete="address-line2" required>
          </div>

          <div class="field field--forty">
            <label for="complemento">Complemento</label>
            <input id="complemento" name="complemento" type="text" autocomplete="address-line3">
          </div>

          <div class="field field--forty">
            <label for="telefone">Telefone <span class="required">*</span></label>
            <input id="telefone" name="telefone" type="tel" inputmode="numeric" autocomplete="tel" required>
          </div>

          <div class="form__actions field--full">
            <button class="button" type="submit" id="submit-button">Enviar</button>
            <p class="form__status" id="form-status" role="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <section class="countdown-section" aria-labelledby="countdown-title">
        <div class="countdown" id="countdown" data-target="2027-02-05T22:00:00-03:00" aria-label="Contagem regressiva para o Camarote Mar 2027">
          <div>
            <strong data-countdown-days>0</strong>
            <span>Dias</span>
          </div>
          <div>
            <strong data-countdown-hours>0</strong>
            <span>Horas</span>
          </div>
          <div>
            <strong data-countdown-minutes>0</strong>
            <span>Minutos</span>
          </div>
          <div>
            <strong data-countdown-seconds>0</strong>
            <span>Segundos</span>
          </div>
        </div>
        <div class="countdown-section__media">
          <img src="assets/img/hero/texto-contagem-2026.webp" alt="">
        </div>
      </section>
    </main>
